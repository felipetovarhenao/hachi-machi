<svg width="100%" viewBox="0 0 680 250" role="img" style="" xmlns="http://www.w3.org/2000/svg">
  <title
    style="fill:rgb(0, 0, 0);stroke:none;color:rgb(240, 240, 240);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family: Lato, 'Century Gothic', 'Gill Sans', -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    Data operations pipeline — conceptual overview</title>
  <desc
